name: NealStreet - Fresh Build Reset

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Fresh Rebuild and Provision
    runs-on: ubuntu-latest
    environment: Dev
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure AWS Credentials
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ ERROR: AWS Secrets are missing!"
            echo "Please ensure AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are set in GitHub Secrets."
            exit 1
          fi
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          aws configure set region us-east-1
          aws configure set output json

      - name: Bootstrap - Ensure S3 State Bucket Exists
        run: |
          BUCKET_NAME="nealstreet-tf-state-$(aws sts get-caller-identity --query Account --output text)"
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating State Bucket: $BUCKET_NAME"
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region us-east-1
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
          else
            echo "State Bucket Already Exists: $BUCKET_NAME"
          fi

      - name: NUKE - Cleanup Existing Account
        run: |
          chmod +x terraform/nuke_nealstreet.sh
          ./terraform/nuke_nealstreet.sh

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: 🧹 Sync Terraform State (Reset Database)
        working-directory: ./terraform
        run: |
          echo "Syncing S3 state with nuked infrastructure..."
          terraform state list | xargs -r terraform state rm || true
        shell: bash

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform
        env:
          TF_VAR_secret_value: ${{ secrets.APP_SECRET }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Final Outputs
        run: |
          echo "Site URL: http://$(terraform output -raw alb_dns_name)"
          echo "CloudWatch Logs: https://console.aws.amazon.com/cloudwatch/home?region=us-east-1#logsV2:log-groups"
        working-directory: ./terraform
