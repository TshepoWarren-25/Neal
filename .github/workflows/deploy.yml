name: AWS IaC & Linux Config Deployment

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_LOG: INFO

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: Dev
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "us-east-1"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 🔥🔥🔥 NUKE - Cleanup Previous Landing Zone
        # This script forcibly deletes all nealstreet resources to ensure a clean slate.
        run: chmod +x terraform/nuke_nealstreet.sh && bash terraform/nuke_nealstreet.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

      - name: Diagnostic - GitHub Runner Context
        run: |
          echo "Branch: ${GITHUB_REF}"
          echo "Event: ${GITHUB_EVENT_NAME}"
          ls -R

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Create SSH Key for Ansible
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ansible/key.pem
          chmod 600 ansible/key.pem

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -var="ssh_private_key_path=../ansible/key.pem" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        working-directory: terraform

      - name: Terraform Apply (FORCED)
        # Forced to run on all pushes to ensure the user gets their resources created immediately.
        run: terraform apply -auto-approve -var="ssh_private_key_path=../ansible/key.pem" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        working-directory: terraform
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
