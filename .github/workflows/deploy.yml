name: AWS IaC & Linux Config Deployment

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_LOG: INFO

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: Dev
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "us-east-1"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Diagnostic - GitHub Runner Context
        run: |
          echo "Branch: ${GITHUB_REF}"
          echo "Event: ${GITHUB_EVENT_NAME}"
          ls -R

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Create SSH Key for Ansible
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ansible/key.pem
          chmod 600 ansible/key.pem

      - name: 🛠️ Bootstrap - Ensure S3 State Bucket Exists
        run: |
          aws s3api head-bucket --bucket "nealstreet-tf-state-414061810385" 2>/dev/null || \
          aws s3 mb s3://nealstreet-tf-state-414061810385 --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

      - name: 🕵️ Auto-Discovery - Claim ALBs & Target Groups
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers --names nealST-dev-alb-01 --query "LoadBalancers[0].LoadBalancerArn" --output text --region us-east-1) || ALB_ARN=""
          TG_ARN=$(aws elbv2 describe-target-groups --names nealST-dev-tg-01 --query "TargetGroups[0].TargetGroupArn" --output text --region us-east-1) || TG_ARN=""
          if [ ! -z "$ALB_ARN" ]; then
            echo -e "\nimport {\n  to = aws_lb.main\n  id = \"$ALB_ARN\"\n}\n" >> terraform/imports.tf
            echo "✅ ALB Import block added for $ALB_ARN"
          fi
          if [ ! -z "$TG_ARN" ]; then
            echo -e "\nimport {\n  to = aws_lb_target_group.web\n  id = \"$TG_ARN\"\n}\n" >> terraform/imports.tf
            echo "✅ TG Import block added for $TG_ARN"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -var="ssh_private_key_path=../ansible/key.pem" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        working-directory: terraform

      - name: Terraform Apply (FORCED)
        # Forced to run on all pushes to ensure the user gets their resources created immediately.
        run: terraform apply -auto-approve -var="ssh_private_key_path=../ansible/key.pem" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        working-directory: terraform
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
